<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings – March Madness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>if (!localStorage.getItem("site_access")) location.replace("access.html");</script>
</head>
<body>

<script src="js/include.js" data-include="header"></script>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h1>March Madness Standings</h1>
    <div class="btn-group" id="sportToggle">
      <a href="standings.html?sport=basketball-men"   id="btn-men"   class="btn btn-outline-primary">Men's</a>
      <a href="standings.html?sport=basketball-women" id="btn-women" class="btn btn-outline-info">Women's</a>
    </div>
  </div>

  <div id="loadingMsg" class="text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Loading standings…</p>
  </div>

  <div id="standings-content" class="d-none"></div>
</div>

<script src="js/include.js" data-include="footer"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const sport  = params.get("sport") || "basketball-men";

  document.addEventListener("DOMContentLoaded", async () => {
    if (window.includeReady && typeof window.includeReady.then === 'function') await window.includeReady;
    await updateNav();

    // Highlight active sport button
    if (sport === "basketball-men") {
      document.getElementById("btn-men").classList.replace("btn-outline-primary", "btn-primary");
    } else {
      document.getElementById("btn-women").classList.replace("btn-outline-info", "btn-info");
    }

    await loadStandings();
  });

  async function loadStandings() {
    const loadingEl  = document.getElementById("loadingMsg");
    const contentEl  = document.getElementById("standings-content");

    try {
      // Fetch all brackets for this sport/year with user info
      const { data: brackets, error: bErr } = await supabase
        .from("brackets")
        .select("id, bracket_name, submitted_date, total_points, app_users(name)")
        .eq("sport", sport)
        .eq("year", TOURNAMENT_YEAR)
        .order("total_points", { ascending: false })
        .order("submitted_date", { ascending: true });

      if (bErr) throw bErr;

      // Fetch all decided games so we can compute points_possible
      const { data: decidedGames, error: gErr } = await supabase
        .from("games")
        .select("id, round, team1_id, team2_id, winner_id")
        .eq("sport", sport)
        .eq("year", TOURNAMENT_YEAR)
        .not("winner_id", "is", null);

      if (gErr) throw gErr;

      // Build eliminated-team set
      const eliminated = new Set();
      for (const g of (decidedGames ?? [])) {
        if (g.team1_id && g.team1_id !== g.winner_id) eliminated.add(g.team1_id);
        if (g.team2_id && g.team2_id !== g.winner_id) eliminated.add(g.team2_id);
      }

      // Fetch all picks for these brackets
      const bracketIds = (brackets ?? []).map((b) => b.id);
      let allPicks = [];
      if (bracketIds.length) {
        const { data: picks, error: pErr } = await supabase
          .from("picks")
          .select("bracket_id, game_id, picked_team_id, games(round, winner_id, team1_id, team2_id)")
          .in("bracket_id", bracketIds);
        if (pErr) throw pErr;
        allPicks = picks ?? [];
      }

      // Fetch championship game id (round = 7) to get champion pick
      const { data: champGames } = await supabase
        .from("games")
        .select("id")
        .eq("sport", sport)
        .eq("year", TOURNAMENT_YEAR)
        .eq("round", 7)
        .limit(1);
      const champGameId = champGames?.[0]?.id ?? null;

      // Fetch all teams for champion name lookup
      const { data: allTeams } = await supabase
        .from("teams")
        .select("id, name_short")
        .eq("sport", sport)
        .eq("year", TOURNAMENT_YEAR);
      const teamById = new Map((allTeams ?? []).map((t) => [t.id, t]));

      // Group picks by bracket
      const picksByBracket = new Map();
      for (const p of allPicks) {
        if (!picksByBracket.has(p.bracket_id)) picksByBracket.set(p.bracket_id, []);
        picksByBracket.get(p.bracket_id).push(p);
      }

      // Build standings rows
      const standings = (brackets ?? []).map((b, idx) => {
        const picks    = picksByBracket.get(b.id) ?? [];
        let possible   = 0;
        let champPick  = "—";

        for (const p of picks) {
          const game = p.games;
          if (!game) continue;
          const pts = Math.pow(2, game.round - 1);
          if (!game.winner_id) {
            if (!eliminated.has(p.picked_team_id)) possible += pts;
          } else {
            if (p.picked_team_id === game.winner_id) possible += pts;
          }
          if (p.game_id === champGameId) {
            champPick = teamById.get(p.picked_team_id)?.name_short ?? "—";
          }
        }

        const submittedDate = new Date(b.submitted_date).toLocaleDateString("en-US", {
          month: "short", day: "numeric", year: "numeric"
        });
        const userName = b.app_users?.name ?? "Unknown";

        return { ...b, rank: idx + 1, possible, champPick, submittedDate, userName };
      });

      loadingEl.classList.add("d-none");
      contentEl.classList.remove("d-none");

      if (!standings.length) {
        const sportLabel = sport === "basketball-men" ? "Men's" : "Women's";
        contentEl.innerHTML = `
          <div class="alert alert-info">
            <strong>No brackets submitted yet for ${sportLabel} Basketball.</strong>
            <p>Be the first to submit your bracket!</p>
            <a href="submit-bracket.html?sport=${sport}" class="btn ${sport === "basketball-men" ? "btn-primary" : "btn-info"}">Submit Bracket</a>
          </div>`;
        return;
      }

      const rows = standings.map((s) => {
        const rankIcon = s.rank === 1 ? "🏆" : s.rank === 2 ? "🥈" : s.rank === 3 ? "🥉" : "";
        const rowClass = s.rank === 1 ? "table-warning" : "";
        return `<tr class="${rowClass}">
          <td><strong>${rankIcon} ${s.rank}</strong></td>
          <td>${escHtml(s.bracket_name)}</td>
          <td>${escHtml(s.userName)}</td>
          <td>${escHtml(s.champPick)}</td>
          <td><strong>${s.total_points}</strong></td>
          <td>${s.possible}</td>
          <td>${s.submittedDate}</td>
          <td><a href="my-bracket.html?sport=${sport}&bracketId=${s.id}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>`;
      }).join("");

      contentEl.innerHTML = `
        <div class="card">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-striped table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>Rank</th><th>Bracket</th><th>User</th><th>Champion Pick</th>
                    <th>Points</th><th>Possible</th><th>Submitted</th><th></th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>
        <p class="text-muted mt-3"><strong>Scoring:</strong> Points double each round (1, 2, 4, 8, 16, 32)</p>`;

    } catch (err) {
      document.getElementById("loadingMsg").classList.add("d-none");
      contentEl.classList.remove("d-none");
      contentEl.innerHTML = `<div class="alert alert-danger"><strong>Error loading standings:</strong> ${escHtml(err.message)}</div>`;
    }
  }

  function escHtml(str) {
    return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
