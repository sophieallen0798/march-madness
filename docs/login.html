<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – March Madness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<script src="js/include.js" data-include="header"></script>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-dark text-white">Admin Login</div>
        <div class="card-body">
          <div id="errorMsg" class="alert alert-danger d-none"></div>
          <div id="successMsg" class="alert alert-success d-none">Signed in! Redirecting…</div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control" required autofocus />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control" required />
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/include.js" data-include="footer"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/data-refresh.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    if (window.includeReady && typeof window.includeReady.then === 'function') await window.includeReady;
    await updateNav();
    // If already signed in, redirect directly to admin panel
    const user = await getCurrentUser();
    if (user) window.location.replace("admin.html");
    try {
      const { data } = await supabase
        .from('sync_status')
        .select('last_refreshed_at')
        .eq('id', 'last_api_sync')
        .maybeSingle();
      if (data?.last_refreshed_at) markApiDataRefresh(new Date(data.last_refreshed_at));
    } catch (err) {
      console.error('Failed to read sync_status:', err);
    }
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl   = document.getElementById("errorMsg");
    const successEl = document.getElementById("successMsg");
    const btn       = document.getElementById("loginBtn");

    errorEl.classList.add("d-none");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = "Sign-in failed: " + error.message;
      errorEl.classList.remove("d-none");
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    // Verify admin email
    if (!ADMIN_EMAILS.map((x) => x.toLowerCase()).includes(email.toLowerCase())) {
      await supabase.auth.signOut();
      errorEl.textContent = "Access denied: this account does not have admin privileges.";
      errorEl.classList.remove("d-none");
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    // Mark site access and redirect
    localStorage.setItem("site_access", "true");
    successEl.classList.remove("d-none");
    setTimeout(() => window.location.replace("admin.html"), 800);
  });
</script>
</body>
</html>
